<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stickers Mundial</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
display:grid;
grid-template-columns:350px 1fr;
gap:30px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:20px;
}

.panel h1{
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
color:white;
}

.btn-download{
background:#0ea5e9;
}

.preview{
display:flex;
justify-content:center;
align-items:flex-start;
overflow:auto;
}

/* STICKER */

.sticker{
position:relative;
width:432px;
height:540px;
overflow:hidden;
}

.template{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* FOTO */

.photo{
position:absolute;

left:90px;
top:140px;

width:200px;
height:260px;

border:6px solid white;
border-radius:40px 40px 100px 100px;

overflow:hidden;
z-index:10;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* NOMBRE */

.name{
position:absolute;
bottom:80px;
left:40px;
width:300px;

font-size:18px;
font-weight:900;
text-transform:uppercase;
text-align:center;
color:white;
}

.team{
position:absolute;
bottom:72px;
left:35px;
width:300px;

font-size:14px;
font-weight:700;
text-align:center;
color:white;
}
z-index:20;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<div class="panel">

<h1>Creador de Stickers</h1>

<label>Subí tu foto</label>
<input type="file" id="photoInput" accept="image/*">

<label>Nombre</label>
<input type="text" id="nameInput" placeholder="">

<label>Selección</label>
<input type="text" id="teamInput" placeholder="Costa Rica">

<label>Plantilla</label>
<select id="templateSelect">
<option value="assets/plantilla-rosa.png">Rosa</option>
<option value="assets/plantilla-azul.png">Azul</option>
</select>

<button class="btn-download" id="downloadBtn">
Descargar Sticker
</button>

</div>

<div class="preview">

<div class="sticker" id="sticker">

<img
src="assets/plantilla-rosa.png"
class="template"
id="templateImg"
>

<div class="photo">
<img id="photoPreview">
</div>

<div class="name" id="nameText">
TU NOMBRE
</div>

<div class="team" id="teamText">
TU EQUIPO
</div>

</div>

</div>

</div>

<script>

const photoInput = document.getElementById("photoInput");
const photoPreview = document.getElementById("photoPreview");

const nameInput = document.getElementById("nameInput");
const nameText = document.getElementById("nameText");

const teamInput = document.getElementById("teamInput");
const teamText = document.getElementById("teamText");

const templateSelect = document.getElementById("templateSelect");
const templateImg = document.getElementById("templateImg");

const downloadBtn = document.getElementById("downloadBtn");

photoInput.addEventListener("change", e => {

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(ev){
photoPreview.src = ev.target.result;
};

reader.readAsDataURL(file);

});

nameInput.addEventListener("input", () => {

nameText.textContent =
nameInput.value || "TU NOMBRE";

});

teamInput.addEventListener("input", () => {

teamText.textContent =
teamInput.value || "TU EQUIPO";

});

templateSelect.addEventListener("change", () => {

templateImg.src =
templateSelect.value;

});

downloadBtn.addEventListener("click", async () => {

const sticker = document.getElementById("sticker");

const canvas = await html2canvas(sticker, {
scale: 1,
useCORS: true,
backgroundColor: null
});

const finalCanvas = document.createElement("canvas");

finalCanvas.width = 1080;
finalCanvas.height = 1350;

const ctx = finalCanvas.getContext("2d");

ctx.drawImage(
canvas,
0,
0,
1080,
1350
);

const link = document.createElement("a");

link.download = "pegatina.png";

link.href = finalCanvas.toDataURL(
"image/png",
1.0
);

link.click();

});

</script>

</body>
</html>
